# ${name} in artifactName templates below resolves to the raw npm package.json
# "name" field, not productName — since ours is scoped (@oscillo-synth/desktop),
# that produces a literal "/" in the output filename and breaks the build
# (electron-builder tries to write into a dist/@oscillo-synth/ dir that's never
# created). Use a plain literal slug in every artifactName instead of ${name}.
appId: com.oscillosynth.app
productName: Oscillo Synth
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack: []
npmRebuild: false
mac:
  icon: build/icon.png
  entitlementsInherit: build/entitlements.mac.plist
  category: public.app-category.music
  notarize: false
dmg:
  artifactName: 'oscillo-synth-${version}.${ext}'
  background: build/background.png
  # background.png is 1448x1086 — treated as a @2x retina asset, so the
  # window itself is set to half that (724x543) to match. Icon positions are
  # a first guess (left = app, right = Applications link, both vertically
  # centered); confirm the DMG actually looks right against the artwork and
  # adjust these if the background has its own drag-arrow/layout guides.
  window:
    width: 724
    height: 543
  contents:
    - x: 180
      y: 280
    - x: 544
      y: 280
      type: link
      path: /Applications
win:
  icon: build/icon-windows.png
  executableName: oscillo-synth
nsis:
  artifactName: 'oscillo-synth-${version}-setup.${ext}'
  shortcutName: '${productName}'
  uninstallDisplayName: '${productName}'
  createDesktopShortcut: always
linux:
  icon: build/icon-linux.png
  target:
    - AppImage
    - deb
  category: AudioVideo
appImage:
  artifactName: 'oscillo-synth-${version}.${ext}'
