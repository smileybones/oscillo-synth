# ${name} in artifactName templates below resolves to the raw npm package.json
# "name" field, not productName — since ours is scoped (@oscillo-synth/desktop),
# that produces a literal "/" in the output filename and breaks the build
# (electron-builder tries to write into a dist/@oscillo-synth/ dir that's never
# created). Use a plain literal slug in every artifactName instead of ${name}.
appId: com.oscillosynth.app
productName: Oscillo Synth
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack: []
npmRebuild: false
mac:
  icon: build/icon.png
  entitlementsInherit: build/entitlements.mac.plist
  category: public.app-category.music
  notarize: false
dmg:
  artifactName: 'oscillo-synth-${version}.${ext}'
  background: build/background.png
  # dmg.window.width/height are silently ignored whenever a background image
  # is set — electron-builder uses the background image's own pixel
  # dimensions as the window size directly (1:1, not @2x), full stop.
  # Confirmed by inspecting the actual .DS_Store embedded in a built DMG
  # (its WindowBounds matched the source background's raw pixel size even
  # with window.width/height explicitly set to something else).
  #
  # The only way to control the DMG window size is to resize the background
  # image file itself. background-source.png is the original 1448x1086
  # artwork (kept for re-editing); background.png is that same art resized
  # to 600x450 via `sips -z 450 600 background-source.png -o background.png`
  # — that resized copy, not the source, is what's actually referenced
  # above. To change the window size again, resize from background-source
  # .png, don't repeatedly downscale background.png itself.
  #
  # Icon positions below are in that same 600x450 pixel/point space,
  # eyeballed from the artwork's drag-arrow (left-to-right, above the
  # "Drag to Install" caption) — still a visual estimate, confirm against
  # the real artwork.
  contents:
    - x: 190
      y: 230
    - x: 410
      y: 230
      type: link
      path: /Applications
win:
  icon: build/icon-windows.png
  executableName: oscillo-synth
nsis:
  artifactName: 'oscillo-synth-${version}-setup.${ext}'
  shortcutName: '${productName}'
  uninstallDisplayName: '${productName}'
  createDesktopShortcut: always
linux:
  icon: build/icon-linux.png
  target:
    - AppImage
    - deb
  category: AudioVideo
appImage:
  artifactName: 'oscillo-synth-${version}.${ext}'
