# ${name} in artifactName templates below resolves to the raw npm package.json
# "name" field, not productName — since ours is scoped (@oscillo-synth/desktop),
# that produces a literal "/" in the output filename and breaks the build
# (electron-builder tries to write into a dist/@oscillo-synth/ dir that's never
# created). Use a plain literal slug in every artifactName instead of ${name}.
appId: com.oscillosynth.app
productName: Oscillo Synth
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack: []
npmRebuild: false
mac:
  icon: build/icon.png
  entitlementsInherit: build/entitlements.mac.plist
  category: public.app-category.music
  notarize: false
dmg:
  artifactName: 'oscillo-synth-${version}.${ext}'
  background: build/background.png
  # background.png is 1448x1086 (exactly 4:3) — window kept at that same 4:3
  # ratio (600x450, a more standard install-window size than the previous
  # 724x543) so the art scales down cleanly instead of stretching. Icon
  # positions eyeballed from the artwork's own drag-arrow (which points
  # roughly left-to-right through the center, above the "Drag to Install"
  # caption panel) and converted from the image's pixel space into the
  # window's point space (scale factor 600/1448 ≈ 0.414) — still a visual
  # estimate, not pixel-measured, so confirm against the real artwork.
  window:
    width: 600
    height: 450
  contents:
    - x: 190
      y: 230
    - x: 410
      y: 230
      type: link
      path: /Applications
win:
  icon: build/icon-windows.png
  executableName: oscillo-synth
nsis:
  artifactName: 'oscillo-synth-${version}-setup.${ext}'
  shortcutName: '${productName}'
  uninstallDisplayName: '${productName}'
  createDesktopShortcut: always
linux:
  icon: build/icon-linux.png
  target:
    - AppImage
    - deb
  category: AudioVideo
appImage:
  artifactName: 'oscillo-synth-${version}.${ext}'
